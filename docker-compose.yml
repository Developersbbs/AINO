version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aino_postgres
    restart: always
    environment:
      POSTGRES_USER: aino_user
      POSTGRES_PASSWORD: aino_password
      POSTGRES_DB: aino_db
    ports:
      - "5433:5432"
    volumes:
      - aino_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aino_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - aino_redisdata:/data

volumes:
  aino_pgdata:
  aino_redisdata:
